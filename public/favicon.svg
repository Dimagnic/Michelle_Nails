<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000814"/>
      <stop offset="100%" style="stop-color:#001833"/>
    </linearGradient>
    <linearGradient id="nail" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a7fff"/>
      <stop offset="100%" style="stop-color:#0044aa"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.55"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Fondo redondo oscuro -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  
  <!-- Forma de uña: arco superior + cuerpo recto -->
  <path d="M 33 62 
           L 33 45 
           C 33 28 67 28 67 45 
           L 67 62 
           Z" 
        fill="url(#nail)" rx="4"/>
  
  <!-- Brillo en la uña -->
  <path d="M 39 38 
           C 37 36 36 38 37 42 
           C 38 50 40 56 40 60 
           C 41 61 42 60 42 58 
           C 42 50 41 40 39 38 Z" 
        fill="url(#shine)"/>
  
  <!-- Puntitos decorativos arriba -->
  <circle cx="50" cy="24" r="2.2" fill="#3B9EFF" opacity="0.8"/>
  <circle cx="40" cy="27" r="1.5" fill="#3B9EFF" opacity="0.5"/>
  <circle cx="60" cy="27" r="1.5" fill="#3B9EFF" opacity="0.5"/>
  
  <!-- Borde sutil en la uña -->
  <path d="M 33 62 L 33 45 C 33 28 67 28 67 45 L 67 62 Z" 
        fill="none" stroke="#3B9EFF" stroke-width="1" opacity="0.4"/>
        
  <!-- Letra M minimalista abajo -->
  <text x="50" y="82" text-anchor="middle" 
        font-family="Georgia, serif" font-size="13" font-weight="300"
        fill="#ffffff" letter-spacing="3" opacity="0.9">MN</text>
</svg>